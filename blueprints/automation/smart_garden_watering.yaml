        {% if day_type | trim == 'cool' %}
          {{ zone_2_cool_duration | int(5) }}
        {% elif day_type | trim == 'hot' %}
          {{ zone_2_hot_duration | int(15) }}
        {% else %}
          {{ zone_2_warm_duration | int(10) }}
        {% endif %}
      z2_should_water: >-
        {{ (zone_2_enabled | bool(false))
           and (zone_2_valve != '')
           and ((z2_interval_due | bool(false)) or (z2_force_water | bool(false)))
           and not (z2_skip_moisture | bool(false)) }}
      z2_result: >-
        {% if not (zone_2_enabled | bool(false)) %}
          ⏭ Disabled
        {% elif zone_2_valve == '' %}
          ⏭ No valve configured
        {% elif z2_skip_moisture | bool(false) %}
