blueprint:
  name: Smart Garden Watering System v0.5
  description: >-
    Automatic 4-zone garden watering system that adapts to daily weather forecasts
    and optional soil moisture sensors.


    **Features**

    - Triggers at a configurable offset after sunrise

    - Skips all watering if today's forecasted precipitation meets or exceeds a threshold

    - Three watering durations based on today's forecast high: cool / warm / hot

    - Per-zone interval-based scheduling (water every N days) tracked via input_datetime helpers

    - Per-zone soil moisture sensor (optional):
        • Skip zone if soil is already wet (above skip threshold)
        • Force-water zone regardless of interval if soil is too dry (below water threshold)

    - 4 independent zones — each with its own valve, sensor, durations, interval, and thresholds

    - **Parallel** zone execution — all due zones run simultaneously

    - Valve availability check — reports offline valves in notifications

    - **Single notification target** — send cycle summaries to one notification service


    **Pre-requisites**

    1. A weather integration that provides daily forecasts, e.g. OpenWeatherMap,
       Met.no, or AccuWeather.

    2. One **Date and time** input_datetime helper per zone you want to track
       (Settings → Helpers → Add Helper → Date and/or time → Date and time).
       Assign them under each zone's "Last Watered Tracker" input.
       Leave the field empty to treat a zone as never watered (always due).

    3. Switch, valve, or input_boolean entities that control each water valve.

  domain: automation
  author: wilman-labs
  homeassistant:
    min_version: "2024.6.0"

  input:

    # ── General ────────────────────────────────────────────────────
    general:
      name: General Settings
      icon: mdi:cog-outline
      description: Scheduling, weather thresholds, and temperature classification.
      input:

        sunrise_offset:
          name: Offset After Sunrise
          description: >-
            How long after sunrise the watering cycle starts.
            Format: HH:MM:SS (e.g. 00:30:00 = 30 minutes after sunrise).
          default: "00:30:00"
          selector:
            duration: {}

        weather_entity:
          name: Weather Entity
          description: >-
            The weather entity used to retrieve today's forecast temperature
            and precipitation.
          selector:
            entity:
              domain: weather

        rain_threshold:
          name: Rain Skip Threshold (mm)
          description: >-
            Skip ALL watering today if the forecasted precipitation is at or
            above this value.
          default: 3
          selector:
            number:
              min: 0
              max: 100
              step: 0.5
              unit_of_measurement: mm
              mode: slider

        temperature_cool_max:
          name: Cool Day — Max Temperature (°C)
          description: >-
            Days with a forecast high BELOW this temperature are classified as
            "cool" and use each zone's Cool Day Duration.
          default: 15
          selector:
            number:
              min: -10
              max: 40
              step: 1
              unit_of_measurement: "°C"
              mode: slider

        temperature_hot_min:
          name: Hot Day — Min Temperature (°C)
          description: >-
            Days with a forecast high AT OR ABOVE this temperature are
            classified as "hot" and use each zone's Hot Day Duration.
            Temperatures between the two thresholds are "warm".
          default: 28
          selector:
            number:
              min: 0
              max: 50
              step: 1
              unit_of_measurement: "°C"
              mode: slider

    # ── Notifications ───────────────────────────────────────────────
    notifications:
      name: Notifications
      icon: mdi:bell-outline
      description: >-
        Configure which notification service receives cycle summaries.
        A persistent Home Assistant notification is always created.
        Add one external notification target (e.g. mobile app, Slack, etc.).
      input:

        notify_target:
          name: "Notification Target (optional)"
          description: >-
            Notify service to call with the cycle summary.
            Examples: notify.mobile_app_my_phone, notify.notify
            Leave empty to only create a persistent HA notification.
          default: ""
          selector:
            text: {}

    # ── Zone 1 ─────────────────────────────────────────────────────
    zone_1:
      name: "Zone 1"
      icon: mdi:sprinkler-variant
      description: >-
        Primary watering zone. Enabled by default — select a valve to get
        started.
      input:

        zone_1_enabled:
          name: "Zone 1 — Enable"
          default: true
          selector:
            boolean: {}

        zone_1_name:
          name: "Zone 1 — Name (optional)"
          description: >-
            A friendly name for this zone (e.g. "Front Lawn", "Vegetable Garden").
            Used in notification messages. Falls back to "Zone 1" when left empty.
          default: ""
          selector:
            text: {}

        zone_1_valve:
          name: "Zone 1 — Valve"
          description: >-
            The switch, valve, or input_boolean entity that opens the water
            valve for Zone 1.
          default: ""
          selector:
            entity:
              domain:
                - switch
                - valve
                - input_boolean

        zone_1_last_watered:
          name: "Zone 1 — Last Watered Tracker (optional)"
          description: >-
            input_datetime helper used to track when Zone 1 was last watered.
            Required for interval-based scheduling. Leave empty to treat Zone 1
            as never watered (always due).
          default: ""
          selector:
            entity:
              domain: input_datetime

        zone_1_watering_interval_days:
          name: "Zone 1 — Watering Interval (days)"
          description: >-
            Minimum number of days between watering runs for Zone 1.
            Set to 1 to water every day (weather permitting).
          default: 2
          selector:
            number:
              min: 1
              max: 10
              step: 1
              unit_of_measurement: days
              mode: slider

        zone_1_moisture_sensor:
          name: "Zone 1 — Soil Moisture Sensor (optional)"
          description: >-
            Sensor reporting soil moisture as a percentage (0–100 %). Leave
            empty to rely solely on the watering interval.
          default: ""
          selector:
            entity:
              domain: sensor

        zone_1_moisture_skip_threshold:
          name: "Zone 1 — Skip if Moisture Above (%)"
          description: >-
            Skip Zone 1 if soil moisture is ABOVE this value.
            Set to 0 to disable.
          default: 70
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        zone_1_moisture_water_threshold:
          name: "Zone 1 — Force Water if Moisture Below (%)"
          description: >-
            Immediately water Zone 1 (ignoring the interval) when soil moisture
            drops BELOW this value. Set to 0 to disable.
          default: 30
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        zone_1_cool_duration:
          name: "Zone 1 — Cool Day Duration (minutes)"
          default: 5
          selector:
            number:
              min: 1
              max: 120
              step: 1
              unit_of_measurement: min
              mode: box

        zone_1_warm_duration:
          name: "Zone 1 — Warm Day Duration (minutes)"
          default: 10
          selector:
            number:
              min: 1
              max: 120
              step: 1
              unit_of_measurement: min
              mode: box

        zone_1_hot_duration:
          name: "Zone 1 — Hot Day Duration (minutes)"
          default: 15
          selector:
            number:
              min: 1
              max: 120
              step: 1
              unit_of_measurement: min
              mode: box

    # ── Zone 2 ─────────────────────────────────────────────────────
    zone_2:
      name: "Zone 2"
      icon: mdi:sprinkler-variant
      description: "Second watering zone. Enable and select a valve to activate."
      input:

        zone_2_enabled:
          name: "Zone 2 — Enable"
          default: false
          selector:
            boolean: {}

        zone_2_name:
          name: "Zone 2 — Name (optional)"
          description: >-
            A friendly name for this zone (e.g. "Back Garden", "Pots").
            Used in notification messages. Falls back to "Zone 2" when left empty.
          default: ""
          selector:
            text: {}

        zone_2_valve:
          name: "Zone 2 — Valve"
          default: ""
          selector:
            entity:
              domain:
                - switch
                - valve
                - input_boolean

        zone_2_last_watered:
          name: "Zone 2 — Last Watered Tracker (optional)"
          default: ""
          selector:
            entity:
              domain: input_datetime

        zone_2_watering_interval_days:
