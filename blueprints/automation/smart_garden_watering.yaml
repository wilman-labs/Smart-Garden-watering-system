        {% else %}
          -1
        {% endif %}
      z1_moisture_line: >-
        {% if z1_skip_moisture | bool(false) %}
        {% elif z1_should_water and zone_1_moisture_sensor != '' and z1_moisture_val >= 0 %}
          Final Moisture : {{ z1_moisture_val | round(0) | int }}% → {{ z1_moisture_end | round(0) | int }}%
        {% elif zone_1_moisture_sensor != '' and z1_moisture_val >= 0 %}
