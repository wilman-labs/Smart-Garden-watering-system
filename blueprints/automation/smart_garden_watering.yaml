  # ════════════════════════════════════════════════════════════════
  # CYCLE COMPLETE — SEND SUMMARY NOTIFICATION
  # ════════════════════════════════════════════════════════════════

  - alias: "Cycle complete — build summary message"
    variables:
      _summary_message: |-
        📅 {{ now().strftime('%Y-%m-%d %H:%M') }}
        🌡 Forecast: {{ today_high_temp }}°C ({{ day_type | trim }} day)
        🌧 Rain: {{ today_precipitation }} mm
        {%- set ns = namespace(parts=[]) -%}
        {%- if zone_1_enabled | bool(false) -%}
        {%- set z1_label = (zone_1_name | trim) or 'Zone 1' -%}
        {%- set z1_ml = z1_moisture_line | trim -%}
        {%- set ns.parts = ns.parts + [z1_label + ': ' + (z1_result | trim) + ('\n' + z1_ml if z1_ml else '')] -%}
        {%- endif -%}
        {%- if zone_2_enabled | bool(false) -%}
        {%- set z2_label = (zone_2_name | trim) or 'Zone 2' -%}
        {%- set z2_ml = z2_moisture_line | trim -%}
        {%- set ns.parts = ns.parts + [z2_label + ': ' + (z2_result | trim) + ('\n' + z2_ml if z2_ml else '')] -%}
        {%- endif -%}
        {%- if zone_3_enabled | bool(false) -%}
        {%- set z3_label = (zone_3_name | trim) or 'Zone 3' -%}
        {%- set z3_ml = z3_moisture_line | trim -%}
        {%- set ns.parts = ns.parts + [z3_label + ': ' + (z3_result | trim) + ('\n' + z3_ml if z3_ml else '')] -%}
        {%- endif -%}
        {%- if zone_4_enabled | bool(false) -%}
        {%- set z4_label = (zone_4_name | trim) or 'Zone 4' -%}
        {%- set z4_ml = z4_moisture_line | trim -%}
        {%- set ns.parts = ns.parts + [z4_label + ': ' + (z4_result | trim) + ('\n' + z4_ml if z4_ml else '')] -%}
        {%- endif %}

        {{ ns.parts | join('\n\n') }}

  - alias: "Cycle complete — persistent notification"
    service: persistent_notification.create
    data:
      title: "🌱 Garden Watering — Cycle Complete"
      notification_id: garden_watering_cycle
      message: "{{ _summary_message }}"

  - alias: "Cycle complete — notify target"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ notify_target != '' }}"
        sequence:
          - service: "{{ notify_target }}"
            data:
              title: "🌱 Garden Watering — Cycle Complete"
              message: "{{ _summary_message }}"
