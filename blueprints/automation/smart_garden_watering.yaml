  # ════════════════════════════════════════════════════════════════
  # EXECUTE ZONES — PARALLEL
  # ════════════════════════════════════════════════════════════════

  - alias: "Execute watering — parallel"
    parallel:
      - sequence:
          - alias: "Zone 1 — water if due"
            choose:
              - conditions:
                  - condition: template
                    value_template: "{{ z1_should_water }}"
                sequence:
                  - service: homeassistant.turn_on
                    target:
                      entity_id: "{{ zone_1_valve }}"
                  - delay:
                      seconds: 2
                  - alias: "Zone 1 — check valve responded"
                    variables:
                      z1_valve_state: "{{ states(zone_1_valve) }}"
                      z1_valve_offline: "{{ z1_valve_state in ['unavailable', 'unknown'] }}"
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ z1_valve_offline }}"
                        sequence:
                          - service: homeassistant.turn_off
                            target:
                              entity_id: "{{ zone_1_valve }}"
                          - variables:
                              z1_should_water: false
                              z1_result: "⚠️ OFFLINE — valve did not respond ({{ zone_1_valve }})"
                    default:
                      - delay:
                          minutes: "{{ z1_duration | int }}"
                      - service: homeassistant.turn_off
                        target:
                          entity_id: "{{ zone_1_valve }}"
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ zone_1_last_watered != '' }}"
                            sequence:
                              - service: input_datetime.set_datetime
                                target:
                                  entity_id: "{{ zone_1_last_watered }}"
                                data:
                                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - sequence:
          - alias: "Zone 2 — water if due"
