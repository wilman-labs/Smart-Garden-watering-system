# ── Trigger ──────────────────────────────────────────────────────────
trigger:
  - platform: sun
    event: sunrise
    offset: !input sunrise_offset

# Run one instance at a time; silently ignore retriggers while running.
mode: single
max_exceeded: silent

# ── Variables ────────────────────────────────────────────────────────
variables:
  weather_entity: !input weather_entity
  rain_threshold: !input rain_threshold
  temperature_cool_max: !input temperature_cool_max
  temperature_hot_min: !input temperature_hot_min
  notify_target: !input notify_target
  # Zone 1
  zone_1_enabled: !input zone_1_enabled
  zone_1_name: !input zone_1_name
  zone_1_valve: !input zone_1_valve
  zone_1_last_watered: !input zone_1_last_watered
  zone_1_watering_interval_days: !input zone_1_watering_interval_days
  zone_1_moisture_sensor: !input zone_1_moisture_sensor
  zone_1_moisture_skip_threshold: !input zone_1_moisture_skip_threshold
  zone_1_moisture_water_threshold: !input zone_1_moisture_water_threshold
  zone_1_cool_duration: !input zone_1_cool_duration
  zone_1_warm_duration: !input zone_1_warm_duration
  zone_1_hot_duration: !input zone_1_hot_duration
  # Zone 2
  zone_2_enabled: !input zone_2_enabled
  zone_2_name: !input zone_2_name
  zone_2_valve: !input zone_2_valve
  zone_2_last_watered: !input zone_2_last_watered
  zone_2_watering_interval_days: !input zone_2_watering_interval_days
  zone_2_moisture_sensor: !input zone_2_moisture_sensor
  zone_2_moisture_skip_threshold: !input zone_2_moisture_skip_threshold
  zone_2_moisture_water_threshold: !input zone_2_moisture_water_threshold
  zone_2_cool_duration: !input zone_2_cool_duration
  zone_2_warm_duration: !input zone_2_warm_duration
  zone_2_hot_duration: !input zone_2_hot_duration
  # Zone 3
  zone_3_enabled: !input zone_3_enabled
  zone_3_name: !input zone_3_name
  zone_3_valve: !input zone_3_valve
  zone_3_last_watered: !input zone_3_last_watered
  zone_3_watering_interval_days: !input zone_3_watering_interval_days
  zone_3_moisture_sensor: !input zone_3_moisture_sensor
  zone_3_moisture_skip_threshold: !input zone_3_moisture_skip_threshold
  zone_3_moisture_water_threshold: !input zone_3_moisture_water_threshold
  zone_3_cool_duration: !input zone_3_cool_duration
  zone_3_warm_duration: !input zone_3_warm_duration
  zone_3_hot_duration: !input zone_3_hot_duration
  # Zone 4
  zone_4_enabled: !input zone_4_enabled
  zone_4_name: !input zone_4_name
  zone_4_valve: !input zone_4_valve
  zone_4_last_watered: !input zone_4_last_watered
  zone_4_watering_interval_days: !input zone_4_watering_interval_days
  zone_4_moisture_sensor: !input zone_4_moisture_sensor
  zone_4_moisture_skip_threshold: !input zone_4_moisture_skip_threshold
  zone_4_moisture_water_threshold: !input zone_4_moisture_water_threshold
  zone_4_cool_duration: !input zone_4_cool_duration
  zone_4_warm_duration: !input zone_4_warm_duration
  zone_4_hot_duration: !input zone_4_hot_duration

# ── Action ───────────────────────────────────────────────────────────
action:

  # ── 1. Fetch today's daily forecast ──────────────────────────────
  - alias: "Fetch daily weather forecast"
    service: weather.get_forecasts
    target:
      entity_id: "{{ weather_entity }}"
    data:
      type: daily
    response_variable: weather_response

  # ── 2. Derive shared forecast variables ──────────────────────────
  - alias: "Parse forecast — precipitation and day type"
    variables:
      _today: "{{ weather_response[weather_entity]['forecast'][0] }}"
      today_precipitation: "{{ _today.precipitation | default(0) | float(0) }}"
      today_high_temp: "{{ _today.temperature | default(20) | float(20) }}"
      rain_skip: "{{ today_precipitation >= (rain_threshold | float(0)) }}"
      day_type: >-
        {% if today_high_temp < (temperature_cool_max | float(15)) %}
          cool
        {% elif today_high_temp >= (temperature_hot_min | float(28)) %}
          hot
        {% else %}
          warm
        {% endif %}

  # ── 3. Abort if too much rain is forecast ────────────────────────
  - alias: "Skip all watering — rain threshold exceeded"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ rain_skip }}"
        sequence:
          - alias: "Notify — rain skip"
            service: persistent_notification.create
            data:
              title: "🌧 Garden Watering — Skipped (Rain)"
              notification_id: garden_watering_cycle
              message: |-
                All zones skipped today.

                🌧 Forecast rain: {{ today_precipitation }} mm — threshold: {{ rain_threshold }} mm
                🌡 Forecast high: {{ today_high_temp }}°C
          - alias: "Notify — rain skip (custom service)"
            choose:
              - conditions:
                  - condition: template
                    value_template: "{{ notify_target != '' }}"
                sequence:
                  - service: "{{ notify_target }}"
                    data:
                      title: "🌧 Garden Watering — Skipped (Rain)"
                      message: |-
                        All zones skipped today.
                        🌧 Forecast rain: {{ today_precipitation }} mm — threshold: {{ rain_threshold }} mm
                        🌡 Forecast high: {{ today_high_temp }}°C
          - stop: "Rain threshold exceeded — all watering skipped"

  # ════════════════════════════════════════════════════════════════
  # ZONE 1
  # ════════════════════════════════════════════════════════════════

  - alias: "Zone 1 — evaluate watering decision"
    variables:
      z1_moisture_val: >-
        {% if zone_1_moisture_sensor != '' and
              states(zone_1_moisture_sensor) not in ['unknown', 'unavailable'] %}
          {{ states(zone_1_moisture_sensor) | float(-1) }}
        {% else %}
          -1
        {% endif %}
      z1_days_elapsed: >-
        {% if zone_1_last_watered != '' and
              states(zone_1_last_watered) not in ['unknown', 'unavailable', ''] %}
          {{ ((as_timestamp(now()) - as_timestamp(states(zone_1_last_watered), 0)) / 86400) | float(0) }}
        {% else %}
          999
        {% endif %}
      z1_interval_due: "{{ z1_days_elapsed >= (zone_1_watering_interval_days | int(2)) }}"
      z1_force_water: >-
        {% set thr = zone_1_moisture_water_threshold | int(0) %}
        {% if z1_moisture_val >= 0 and thr > 0 %}
          {{ z1_moisture_val < thr }}
        {% else %}
          false
        {% endif %}
      z1_skip_moisture: >-
        {% set thr = zone_1_moisture_skip_threshold | int(0) %}
        {% if z1_moisture_val >= 0 and thr > 0 %}
          {{ z1_moisture_val > thr }}
        {% else %}
          false
        {% endif %}
      z1_duration: >-
        {% if day_type | trim == 'cool' %}
          {{ zone_1_cool_duration | int(5) }}
        {% elif day_type | trim == 'hot' %}
          {{ zone_1_hot_duration | int(15) }}
        {% else %}
          {{ zone_1_warm_duration | int(10) }}
        {% endif %}
      z1_should_water: >-
        {{ (zone_1_enabled | bool(false))
           and (zone_1_valve != '')
           and ((z1_interval_due | bool(false)) or (z1_force_water | bool(false)))
           and not (z1_skip_moisture | bool(false)) }}
      z1_result: >-
        {% if not (zone_1_enabled | bool(false)) %}
          ⏭ Disabled
        {% elif zone_1_valve == '' %}
          ⏭ No valve configured
        {% elif z1_skip_moisture | bool(false) %}
          ⏭ Skipped — soil moisture {{ z1_moisture_val | round(0) | int }}% is above {{ zone_1_moisture_skip_threshold }}%
        {% elif not (z1_interval_due | bool(false)) and not (z1_force_water | bool(false)) %}
          ⏭ Skipped — {{ z1_days_elapsed | round(0) | int }} days into a {{ zone_1_watering_interval_days }} day cycle
        {% else %}
          💧 Watered {{ z1_duration }} min ({{ day_type | trim }} day)
        {% endif %}
      z1_moisture_line: >-
        {% if zone_1_moisture_sensor != '' and z1_moisture_val >= 0 %}
          Final Moisture : {{ z1_moisture_val | round(0) | int }}%
        {% elif zone_1_moisture_sensor != '' %}
          Final Moisture : sensor unavailable
        {% else %}
          Final Moisture : no sensor
        {% endif %}

  # ════════════════════════════════════════════════════════════════
  # ZONE 2
  # ════════════════════════════════════════════════════════════════

  - alias: "Zone 2 — evaluate watering decision"
    variables:
      z2_moisture_val: >-
        {% if zone_2_moisture_sensor != '' and
              states(zone_2_moisture_sensor) not in ['unknown', 'unavailable'] %}
          {{ states(zone_2_moisture_sensor) | float(-1) }}
        {% else %}
          -1
        {% endif %}
      z2_days_elapsed: >-
        {% if zone_2_last_watered != '' and
              states(zone_2_last_watered) not in ['unknown', 'unavailable', ''] %}
          {{ ((as_timestamp(now()) - as_timestamp(states(zone_2_last_watered), 0)) / 86400) | float(0) }}
        {% else %}
          999
        {% endif %}
      z2_interval_due: "{{ z2_days_elapsed >= (zone_2_watering_interval_days | int(2)) }}"
      z2_force_water: >-
        {% set thr = zone_2_moisture_water_threshold | int(0) %}
        {% if z2_moisture_val >= 0 and thr > 0 %}
          {{ z2_moisture_val < thr }}
        {% else %}
          false
        {% endif %}
      z2_skip_moisture: >-
        {% set thr = zone_2_moisture_skip_threshold | int(0) %}
        {% if z2_moisture_val >= 0 and thr > 0 %}
          {{ z2_moisture_val > thr }}
        {% else %}
          false
        {% endif %}
