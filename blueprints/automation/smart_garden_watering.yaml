          default: 70
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        zone_2_moisture_water_threshold:
          name: "Zone 2 — Force Water if Moisture Below (%)"
          default: 30
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        zone_2_cool_duration:
          name: "Zone 2 — Cool Day Duration (minutes)"
          default: 5
          selector:
            number:
              min: 1
              max: 120
              step: 1
              unit_of_measurement: min
              mode: box

        zone_2_warm_duration:
          name: "Zone 2 — Warm Day Duration (minutes)"
          default: 10
          selector:
            number:
              min: 1
              max: 120
              step: 1
              unit_of_measurement: min
              mode: box

        zone_2_hot_duration:
          name: "Zone 2 — Hot Day Duration (minutes)"
          default: 15
          selector:
            number:
              min: 1
              max: 120
              step: 1
              unit_of_measurement: min
              mode: box

    # ── Zone 3 ─────────────────────────────────────────────────────
    zone_3:
      name: "Zone 3"
      icon: mdi:sprinkler-variant
      description: "Third watering zone. Enable and select a valve to activate."
      input:

        zone_3_enabled:
          name: "Zone 3 — Enable"
          default: false
          selector:
            boolean: {}

        zone_3_name:
          name: "Zone 3 — Name (optional)"
          description: >-
            A friendly name for this zone (e.g. "Side Beds", "Orchard").
            Used in notification messages. Falls back to "Zone 3" when left empty.
          default: ""
          selector:
            text: {}

        zone_3_valve:
          name: "Zone 3 — Valve"
          default: ""
