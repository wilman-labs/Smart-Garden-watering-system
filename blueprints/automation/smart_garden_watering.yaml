                  - condition: template
                    value_template: "{{ z3_should_water }}"
                sequence:
                  - service: homeassistant.turn_on
                    target:
                      entity_id: "{{ zone_3_valve }}"
                  - delay:
                      seconds: 2
                  - alias: "Zone 3 — check valve responded"
                    variables:
