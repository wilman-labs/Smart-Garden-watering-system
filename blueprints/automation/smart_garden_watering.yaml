                                value_template: "{{ zone_2_last_watered != '' }}"
                            sequence:
                              - service: input_datetime.set_datetime
                                target:
                                  entity_id: "{{ zone_2_last_watered }}"
                                data:
                                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - sequence:
