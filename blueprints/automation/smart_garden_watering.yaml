                          - variables:
                              z3_should_water: false
                              z3_result: "⚠️ OFFLINE — valve did not respond ({{ zone_3_valve }})"
                    default:
                      - delay:
                          minutes: "{{ z3_duration | int }}"
                      - service: homeassistant.turn_off
                        target:
                          entity_id: "{{ zone_3_valve }}"
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ zone_3_last_watered != '' }}"
                            sequence:
                              - service: input_datetime.set_datetime
                                target:
                                  entity_id: "{{ zone_3_last_watered }}"
                                data:
                                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - sequence:
          - alias: "Zone 4 — water if due"
            choose:
              - conditions:
                  - condition: template
                    value_template: "{{ z4_should_water }}"
                sequence:
                  - service: homeassistant.turn_on
                    target:
                      entity_id: "{{ zone_4_valve }}"
                  - delay:
                      seconds: 2
                  - alias: "Zone 4 — check valve responded"
